name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npm run package

      - name: Package VSIX
        run: npx vsce package --out zodify-json.vsix

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath zodify-json.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        continue-on-error: true
        run: |
          for i in {1..3}; do
            npx ovsx publish zodify-json.vsix --pat ${{ secrets.OVSX_PAT }} && break || \
            if [ $i -lt 3 ]; then
              echo "::warning::Open VSX publish failed (attempt $i). Retrying in 15s..."
              sleep 15
            else
              echo "::error::Open VSX publish failed after 3 attempts."
              exit 1
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zodify-json.vsix
          generate_release_notes: true
